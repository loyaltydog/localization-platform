name: Sync Translations with Crowdin

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Direction: upload (local → Crowdin) or download (Crowdin → local PR)"
        required: true
        type: choice
        options:
          - upload
          - download

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: ${{ github.event.inputs.action == 'upload' && 'Upload translations to Crowdin' || 'Download translations and open PR' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.I18N_SYNC_PAT }}

      - name: Install Crowdin CLI
        run: npm install -g @crowdin/cli

      # ── UPLOAD ────────────────────────────────────────────────────────────

      - name: Upload source files (en-US → Crowdin)
        if: github.event.inputs.action == 'upload'
        env:
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        run: crowdin upload sources

      - name: Upload existing translations (all locales → Crowdin)
        if: github.event.inputs.action == 'upload'
        env:
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        run: crowdin upload translations

      # ── DOWNLOAD ──────────────────────────────────────────────────────────

      - name: Download translations from Crowdin
        if: github.event.inputs.action == 'download'
        env:
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        run: crowdin download

      - name: Show what changed
        if: github.event.inputs.action == 'download'
        run: git diff --stat packages/i18n/locales/ || true

      - name: Open PR with translation changes
        if: github.event.inputs.action == 'download'
        env:
          GH_TOKEN: ${{ secrets.I18N_SYNC_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/i18n/locales/
          if git diff --staged --quiet; then
            echo "No translation changes — nothing to commit."
          else
            BRANCH="chore/sync-translations-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "chore(i18n): sync translations from Crowdin [skip ci]"
            git push origin "$BRANCH"
            gh pr create \
              --title "chore(i18n): sync translations from Crowdin" \
              --body "Automated translation sync from Crowdin." \
              --base main \
              --head "$BRANCH"
          fi
