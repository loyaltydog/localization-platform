name: Sync translations from Lokalise

on:
  schedule:
    - cron: '0 */12 * * *'   # every 12 hours at :00
  workflow_dispatch:           # allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    name: Download translations and commit to main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Lokalise CLI v2
        run: |
          curl -sfL \
            https://raw.githubusercontent.com/lokalise/lokalise-cli-2-go/master/install.sh \
            | sh -s -- -b /usr/local/bin
          lokalise2 --help || true

      - name: Download translations from Lokalise
        env:
          LOKALISE_API_KEY: ${{ secrets.LOKALISE_API_KEY }}
          LOKALISE_PROJECT_ID: ${{ secrets.LOKALISE_PROJECT_ID }}
        run: |
          cd packages/i18n
          lokalise2 file download \
            --token "$LOKALISE_API_KEY" \
            --project-id "$LOKALISE_PROJECT_ID" \
            --unzip-to locales

      - name: Show what changed
        run: git diff --stat packages/i18n/locales/ || true

      - name: Commit and push translation changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/i18n/locales/
          if git diff --staged --quiet; then
            echo "No translation changes — nothing to commit."
          else
            git commit -m "chore(i18n): sync translations from Lokalise [skip ci]"
            git push origin main
          fi
